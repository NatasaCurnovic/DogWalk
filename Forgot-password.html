<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogWalk – Zaboravljena lozinka</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="main-header">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="index.html" class="logo">DogWalk</a>
        <nav class="nav-menu d-none d-md-flex" id="navMenu" role="navigation" aria-label="Glavna navigacija">
            <a href="index.html#hero-section">Početna</a>
            <a href="index.html#walker-section">Šetači pasa</a>
            <a href="index.html#about-section">O nama</a>
        </nav>
        <div class="header-actions d-none d-md-flex gap-2">
            <a href="login.html" class="btn btn-outline-light">Login</a>
        </div>
    </div>
</header>

<!-- ===== FORGOT PASSWORD ===== -->
<main class="auth-page">
    <div class="auth-split auth-split--narrow">

        <div class="auth-form-panel">
            <div class="auth-form-box">
                <h1 class="auth-form-title">Zaboravili ste lozinku?</h1>
                <p class="auth-form-subtitle">Unesite e-mail adresu vašeg naloga i poslaćemo vam link za resetovanje.</p>

                <div id="forgot-alert" class="auth-alert d-none" role="alert" aria-live="assertive"></div>

                <!-- Step 1: Request reset -->
                <div id="forgot-step-request">
                    <form id="forgot-form" novalidate aria-label="Forma za resetovanje lozinke">
                        <div class="form-group">
                            <label for="email">E-mail adresa <span class="required" aria-hidden="true">*</span></label>
                            <input
                                    type="email"
                                    id="email"
                                    name="email"
                                    class="auth-input"
                                    placeholder="vasa@email.com"
                                    autocomplete="email"
                                    required
                                    aria-required="true"
                                    aria-describedby="email-error"
                            >
                            <span class="field-error" id="email-error" role="alert"></span>
                        </div>

                        <button type="submit" class="auth-submit-btn" id="forgot-submit-btn">
                            <span class="btn-text">Pošalji link za resetovanje</span>
                            <span class="btn-spinner d-none" aria-hidden="true">
                                <i class="bi bi-arrow-repeat spin"></i>
                            </span>
                        </button>
                    </form>
                </div>

                <!-- Step 2: Success message (shown after submit) -->
                <div id="forgot-step-success" class="d-none">
                    <div class="success-box" role="status" aria-live="polite">
                        <div class="success-icon"><i class="bi bi-envelope-check" aria-hidden="true"></i></div>
                        <h2 class="success-title">Link je poslat!</h2>
                        <p class="success-desc">Proverite vaš inbox. Link za resetovanje lozinke važi 30 minuta.</p>
                    </div>
                </div>

                <p class="auth-back-link">
                    <a href="login.html">
                        <i class="bi bi-arrow-left" aria-hidden="true"></i> Nazad na prijavu
                    </a>
                </p>
            </div>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="auth.js"></script>
</body>
</html>
