<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogWalk – Registracija</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Shared styles -->
    <link rel="stylesheet" href="style.css">
    <!-- Page-specific styles -->
    <link rel="stylesheet" href="auth.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="main-header">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="index.html" class="logo">DogWalk</a>

        <button class="nav-toggle d-md-none" id="navToggle" aria-label="Otvori meni" aria-expanded="false">
            <i class="bi bi-list"></i>
        </button>

        <nav class="nav-menu" id="navMenu" role="navigation" aria-label="Glavna navigacija">
            <a href="index.html#hero-section">Početna</a>
            <a href="index.html#walker-section">Šetači pasa</a>
            <a href="index.html#about-section">O nama</a>
            <a href="index.html#how-section">Kako funkcioniše</a>
            <a href="index.html#contact-section">Kontakt</a>
        </nav>

        <div class="header-actions d-none d-md-flex gap-2">
            <a href="login.html" class="btn btn-outline-light">Login</a>
            <a href="register.html" class="btn btn-success">Postani šetač</a>
        </div>
    </div>
</header>

<!-- ===== REGISTER SECTION ===== -->
<main class="auth-page">
    <div class="auth-split">

        <!-- Right form panel -->
        <div class="auth-form-panel">
            <div class="auth-form-box">
                <h1 class="auth-form-title">Kreiraj nalog</h1>
                <p class="auth-form-subtitle">Već imaš nalog? <a href="login.html">Prijavi se</a></p>

                <!-- Inline error/success banners (hidden by default) -->
                <div id="register-alert" class="auth-alert d-none" role="alert" aria-live="assertive"></div>

                <form id="register-form" novalidate aria-label="Forma za registraciju">

                    <div class="form-row">
                        <div class="form-group">
                            <label for="first-name">Ime <span class="required" aria-hidden="true">*</span></label>
                            <input
                                    type="text"
                                    id="first-name"
                                    name="firstName"
                                    class="auth-input"
                                    placeholder="Vaše ime"
                                    autocomplete="given-name"
                                    required
                                    aria-required="true"
                                    aria-describedby="first-name-error"
                            >
                            <span class="field-error" id="first-name-error" role="alert"></span>
                        </div>

                        <div class="form-group">
                            <label for="last-name">Prezime <span class="required" aria-hidden="true">*</span></label>
                            <input
                                    type="text"
                                    id="last-name"
                                    name="lastName"
                                    class="auth-input"
                                    placeholder="Vaše prezime"
                                    autocomplete="family-name"
                                    required
                                    aria-required="true"
                                    aria-describedby="last-name-error"
                            >
                            <span class="field-error" id="last-name-error" role="alert"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail adresa <span class="required" aria-hidden="true">*</span></label>
                        <input
                                type="email"
                                id="email"
                                name="email"
                                class="auth-input"
                                placeholder="vasa@email.com"
                                autocomplete="email"
                                required
                                aria-required="true"
                                aria-describedby="email-error"
                        >
                        <span class="field-error" id="email-error" role="alert"></span>
                    </div>

                    <div class="form-group">
                        <label for="phone">Broj telefona</label>
                        <input
                                type="tel"
                                id="phone"
                                name="phone"
                                class="auth-input"
                                placeholder="+381 60 123 4567"
                                autocomplete="tel"
                                aria-describedby="phone-error"
                        >
                        <span class="field-error" id="phone-error" role="alert"></span>
                    </div>

                    <div class="form-group">
                        <label for="address">Adresa</label>
                        <input
                                type="text"
                                id="address"
                                name="address"
                                class="auth-input"
                                placeholder="Ulica i broj, grad"
                                autocomplete="street-address"
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Lozinka <span class="required" aria-hidden="true">*</span></label>
                        <div class="input-with-icon">
                            <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    class="auth-input"
                                    placeholder="Minimalno 8 karaktera"
                                    autocomplete="new-password"
                                    required
                                    aria-required="true"
                                    aria-describedby="password-error password-hint"
                            >
                            <button type="button" class="toggle-password" aria-label="Prikaži/sakrij lozinku" data-target="password">
                                <i class="bi bi-eye" aria-hidden="true"></i>
                            </button>
                        </div>
                        <span class="field-hint" id="password-hint">Minimalno 8 karaktera, bar jedno veliko slovo i broj.</span>
                        <span class="field-error" id="password-error" role="alert"></span>
                    </div>

                    <div class="form-group">
                        <label for="password-confirm">Potvrdi lozinku <span class="required" aria-hidden="true">*</span></label>
                        <div class="input-with-icon">
                            <input
                                    type="password"
                                    id="password-confirm"
                                    name="passwordConfirm"
                                    class="auth-input"
                                    placeholder="Ponovite lozinku"
                                    autocomplete="new-password"
                                    required
                                    aria-required="true"
                                    aria-describedby="password-confirm-error"
                            >
                            <button type="button" class="toggle-password" aria-label="Prikaži/sakrij potvrdu lozinke" data-target="password-confirm">
                                <i class="bi bi-eye" aria-hidden="true"></i>
                            </button>
                        </div>
                        <span class="field-error" id="password-confirm-error" role="alert"></span>
                    </div>

                    <!-- Walker toggle -->
                    <div class="walker-toggle-box" role="group" aria-labelledby="walker-toggle-label">
                        <div class="walker-toggle-header">
                            <div>
                                <p class="walker-toggle-title" id="walker-toggle-label">
                                    <i class="bi bi-person-badge" aria-hidden="true"></i>
                                    Registruj se kao šetač pasa
                                </p>
                                <p class="walker-toggle-desc">Zahteva odobrenje administratora nakon e-mail verifikacije.</p>
                            </div>
                            <label class="toggle-switch" aria-label="Postani šetač">
                                <input type="checkbox" id="is-walker" name="isWalker" role="switch" aria-checked="false">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>

                        <!-- Extra walker fields (hidden until toggle) -->
                        <div id="walker-fields" class="walker-extra-fields d-none" aria-hidden="true">
                            <div class="form-group">
                                <label for="walker-description">Kratki opis (o sebi)</label>
                                <textarea
                                        id="walker-description"
                                        name="walkerDescription"
                                        class="auth-input auth-textarea"
                                        placeholder="Recite nešto o sebi, iskustvu sa psima..."
                                        rows="3"
                                        aria-describedby="walker-description-error"
                                ></textarea>
                                <span class="field-error" id="walker-description-error" role="alert"></span>
                            </div>

                            <div class="form-group">
                                <label for="favorite-breed">Omiljena rasa pasa</label>
                                <select id="favorite-breed" name="favoriteBreed" class="auth-input">
                                    <option value="">Izaberite rasu</option>
                                    <option value="labrador">Labrador</option>
                                    <option value="pudla">Pudla</option>
                                    <option value="zlatni-retriver">Zlatni retriver</option>
                                    <option value="nemacki-ovar">Nemački ovčar</option>
                                    <option value="buldog">Buldog</option>
                                    <option value="ostalo">Ostalo / Sve rase</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="terms" name="terms" required aria-required="true" aria-describedby="terms-error">
                            <span>Prihvatam <a href="#" target="_blank" rel="noopener noreferrer">uslove korišćenja</a> i <a href="#" target="_blank" rel="noopener noreferrer">politiku privatnosti</a></span>
                        </label>
                        <span class="field-error" id="terms-error" role="alert"></span>
                    </div>

                    <button type="submit" class="auth-submit-btn" id="register-submit-btn">
                        <span class="btn-text">Kreiraj nalog</span>
                        <span class="btn-spinner d-none" aria-hidden="true">
                            <i class="bi bi-arrow-repeat spin"></i>
                        </span>
                    </button>

                </form>
            </div>
        </div>

    </div>
</main>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="auth.js"></script>
</body>
</html>
